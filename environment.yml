name: posture-risk
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.10.14

  # Ciencia de datos core
  - numpy=1.26.4
  - pandas=2.2.2
  - scipy=1.13.1
  - scikit-learn=1.5.1
  - statsmodels=0.14.2
  - pywavelets=1.6.0
  - h5py=3.11.0

  # PyTorch CPU (funciona en cualquier Windows sin GPU NVIDIA)
  - pytorch::pytorch=2.3.1
  - pytorch::torchvision=0.18.1
  - pytorch::cpuonly

  # Visualización
  - matplotlib=3.9.1
  - seaborn=0.13.2
  - plotly=5.22.0

  # Notebooks
  - jupyterlab=4.2.4
  - ipywidgets=8.1.3
  - nbformat=5.10.4

  # Calidad de código
  - black=24.8.0
  - flake8=7.1.1
  - pytest=8.3.2
  - pytest-cov=5.0.0

  # Utilidades
  - pip
  - pyyaml=6.0.2
  - tqdm=4.66.5
  - click=8.1.7
  - python-dotenv=1.0.1

  - pip:
    - loguru==0.7.2
    - torchinfo==1.8.0
    - mlflow==2.15.1
